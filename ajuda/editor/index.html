<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editor da Ajuda - Rotina Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --bg:#f8fafc; --panel:#fff; --text:#0f172a; --muted:#64748b; --line:#dbe3ef; --brand:#2563eb; --brand-dark:#1d4ed8; --danger:#b91c1c; --ok:#15803d; --shadow:0 18px 45px rgba(15,23,42,.08); }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 28px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.92); position:sticky; top:0; z-index:5; backdrop-filter:blur(12px); }
    h1 { margin:0; font-size:20px; line-height:1.2; }
    main { display:grid; grid-template-columns:minmax(280px,360px) minmax(0,1fr); min-height:calc(100vh - 73px); }
    aside { border-right:1px solid var(--line); background:#fff; padding:20px; overflow:auto; }
    section { padding:20px; min-width:0; }
    label { display:grid; gap:7px; margin-bottom:14px; color:var(--muted); font-size:13px; font-weight:700; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--text); font:inherit; padding:10px 12px; outline:none; }
    input:focus, select:focus, textarea:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(37,99,235,.14); }
    textarea { min-height:430px; resize:vertical; line-height:1.55; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace; font-size:14px; }
    button, .button { appearance:none; border:1px solid transparent; border-radius:8px; background:var(--brand); color:#fff; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:9px 13px; text-decoration:none; font-weight:800; font-size:14px; }
    button:hover, .button:hover { background:var(--brand-dark); }
    button.secondary, .button.secondary { background:#fff; color:var(--text); border-color:var(--line); }
    button.secondary:hover, .button.secondary:hover { background:#f1f5f9; }
    button.danger { background:#fff; color:var(--danger); border-color:#fecaca; }
    button.danger:hover { background:#fef2f2; }
    button:disabled { cursor:not-allowed; opacity:.55; }
    .actions { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); padding:18px; margin-bottom:18px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .article-list { display:grid; gap:8px; margin-top:14px; }
    .article-item { border:1px solid var(--line); border-radius:8px; background:#fff; cursor:pointer; padding:11px 12px; text-align:left; width:100%; }
    .article-item strong { display:block; color:var(--text); font-size:14px; margin-bottom:4px; }
    .article-item span, .hint, .status { color:var(--muted); font-size:12px; }
    .article-item.active { border-color:var(--brand); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .status { min-height:20px; } .status.ok { color:var(--ok); } .status.error { color:var(--danger); }
    .preview { border:1px solid var(--line); border-radius:8px; background:#fff; min-height:430px; overflow:auto; padding:20px; line-height:1.6; }
    .preview h1, .preview h2, .preview h3 { line-height:1.25; }
    .preview code { background:#f1f5f9; border-radius:4px; padding:2px 5px; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { background:#fff; color:var(--text); border-color:var(--line); }
    .tab.active { background:var(--text); color:#fff; border-color:var(--text); }
    @media (max-width:920px) { header { align-items:flex-start; flex-direction:column; } main { grid-template-columns:1fr; } aside { border-right:0; border-bottom:1px solid var(--line); } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <div><h1>Editor da Central de Ajuda</h1><div class="hint">Crie e publique tutoriais direto no GitHub Pages.</div></div>
    <div class="actions"><a class="button secondary" href="../">Ver ajuda</a><button id="loadButton" type="button">Carregar do GitHub</button><button id="saveButton" type="button">Publicar</button></div>
  </header>
  <main>
    <aside>
      <div class="panel">
        <label>Dono do repositório<input id="ownerInput" autocomplete="off" placeholder="ex: minha-contabilidade"></label>
        <label>Repositório<input id="repoInput" autocomplete="off" placeholder="ex: rotinaflow"></label>
        <label>Branch<input id="branchInput" autocomplete="off" value="main"></label>
        <label>Pasta da ajuda<input id="basePathInput" autocomplete="off" value="ajuda"></label>
        <label>Token GitHub<input id="tokenInput" type="password" autocomplete="off" placeholder="token fine-grained com Contents read/write"></label>
        <div class="actions"><button id="rememberButton" class="secondary" type="button">Salvar config</button><button id="clearButton" class="danger" type="button">Limpar</button></div>
        <p class="hint">O token fica somente neste navegador, em localStorage. Use um token com acesso apenas a este repositório.</p>
      </div>
      <div class="panel"><div class="actions"><button id="newButton" type="button">Novo tutorial</button></div><div id="articleList" class="article-list"></div></div>
    </aside>
    <section>
      <div class="panel">
        <div class="grid">
          <label>Título<input id="titleInput" placeholder="Como gerar o DAS"></label>
          <label>Categoria<select id="categoryInput"></select></label>
          <label>Slug do arquivo<input id="slugInput" placeholder="gerar-das"></label>
          <label>ID ou URL do vídeo YouTube<input id="videoInput" placeholder="https://youtu.be/..."></label>
        </div>
        <div class="actions"><button id="templateButton" class="secondary" type="button">Aplicar modelo</button><button id="openGithubButton" class="secondary" type="button">Abrir no GitHub</button></div>
      </div>
      <div class="panel">
        <div class="tabs"><button id="writeTab" class="tab active" type="button">Escrever</button><button id="previewTab" class="tab" type="button">Preview</button></div>
        <textarea id="contentInput" spellcheck="false"></textarea><div id="preview" class="preview" hidden></div>
      </div>
      <div class="panel"><div class="actions"><button id="saveButtonBottom" type="button">Publicar tutorial</button><button id="deleteButton" class="danger" type="button">Remover da lista local</button></div><p id="status" class="status"></p></div>
    </section>
  </main>
  <script>
    const categories = [
      { label: 'Simples Nacional', path: 'simples-nacional' },
      { label: 'Folha, Pró-labore e eSocial', path: 'folha-esocial' },
      { label: 'Configurações gerais', path: 'configuracoes-gerais' }
    ];
    const els = {
      owner: document.getElementById('ownerInput'), repo: document.getElementById('repoInput'), branch: document.getElementById('branchInput'), basePath: document.getElementById('basePathInput'), token: document.getElementById('tokenInput'), title: document.getElementById('titleInput'), category: document.getElementById('categoryInput'), slug: document.getElementById('slugInput'), video: document.getElementById('videoInput'), content: document.getElementById('contentInput'), list: document.getElementById('articleList'), status: document.getElementById('status'), preview: document.getElementById('preview'), writeTab: document.getElementById('writeTab'), previewTab: document.getElementById('previewTab')
    };
    let articles = []; let selectedPath = ''; let selectedSha = ''; let sidebarSha = '';
    categories.forEach((category) => { const option = document.createElement('option'); option.value = category.path; option.textContent = category.label; els.category.appendChild(option); });
    loadConfig(); bindEvents(); newArticle();
    function bindEvents() {
      document.getElementById('rememberButton').addEventListener('click', saveConfig);
      document.getElementById('clearButton').addEventListener('click', clearConfig);
      document.getElementById('loadButton').addEventListener('click', loadFromGithub);
      document.getElementById('saveButton').addEventListener('click', saveArticle);
      document.getElementById('saveButtonBottom').addEventListener('click', saveArticle);
      document.getElementById('newButton').addEventListener('click', newArticle);
      document.getElementById('templateButton').addEventListener('click', applyTemplate);
      document.getElementById('deleteButton').addEventListener('click', removeLocalArticle);
      document.getElementById('openGithubButton').addEventListener('click', openOnGithub);
      els.title.addEventListener('input', () => { if (!selectedPath) els.slug.value = slugify(els.title.value); });
      els.writeTab.addEventListener('click', () => setTab('write'));
      els.previewTab.addEventListener('click', () => setTab('preview'));
      els.content.addEventListener('input', renderPreview);
    }
    function config() { return { owner: els.owner.value.trim(), repo: els.repo.value.trim(), branch: els.branch.value.trim() || 'main', basePath: trimSlashes(els.basePath.value.trim() || 'ajuda'), token: els.token.value.trim() }; }
    function saveConfig() { localStorage.setItem('rotinaflowHelpEditor', JSON.stringify(config())); setStatus('Configuração salva neste navegador.', 'ok'); }
    function loadConfig() { const saved = JSON.parse(localStorage.getItem('rotinaflowHelpEditor') || '{}'); els.owner.value = saved.owner || ''; els.repo.value = saved.repo || ''; els.branch.value = saved.branch || 'main'; els.basePath.value = saved.basePath || 'ajuda'; els.token.value = saved.token || ''; }
    function clearConfig() { localStorage.removeItem('rotinaflowHelpEditor'); els.token.value = ''; setStatus('Configuração local removida.', 'ok'); }
    async function loadFromGithub() {
      try {
        setStatus('Carregando arquivos do GitHub...'); saveConfig(); const cfg = config(); requireConfig(cfg);
        const tree = await github(`/repos/${cfg.owner}/${cfg.repo}/git/trees/${cfg.branch}?recursive=1`);
        const base = cfg.basePath + '/';
        const markdownFiles = tree.tree.filter((item) => item.type === 'blob' && item.path.startsWith(base) && item.path.endsWith('.md')).filter((item) => !item.path.endsWith('/README.md') && !item.path.endsWith('/PUBLICAR_GITHUB_PAGES.md') && !item.path.endsWith('/_sidebar.md'));
        articles = await Promise.all(markdownFiles.map(async (item) => { const file = await github(`/repos/${cfg.owner}/${cfg.repo}/contents/${item.path}?ref=${cfg.branch}`); return parseArticle(item.path, file.sha, decodeBase64(file.content)); }));
        try { const sidebar = await github(`/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.basePath}/_sidebar.md?ref=${cfg.branch}`); sidebarSha = sidebar.sha; } catch (error) { sidebarSha = ''; }
        renderList(); setStatus(`${articles.length} tutoriais carregados.`, 'ok');
      } catch (error) { setStatus(error.message, 'error'); }
    }
    function parseArticle(path, sha, content) { const relative = path.replace(config().basePath + '/', ''); const parts = relative.split('/'); const categoryPath = parts.length > 1 ? parts[0] : categories[0].path; const filename = parts.pop() || ''; const title = (content.match(/^#\s+(.+)$/m) || [])[1] || filename.replace(/\.md$/, ''); const video = (content.match(/youtube\.com\/embed\/([^"?<\s]+)/) || [])[1] || ''; return { path, sha, title, category: categoryPath, slug: filename.replace(/\.md$/, ''), video, content }; }
    function renderList() { els.list.innerHTML = ''; [...articles].sort((a,b) => a.category.localeCompare(b.category) || a.title.localeCompare(b.title)).forEach((article) => { const item = document.createElement('button'); item.type = 'button'; item.className = 'article-item' + (article.path === selectedPath ? ' active' : ''); item.innerHTML = `<strong>${escapeHtml(article.title)}</strong><span>${escapeHtml(article.path)}</span>`; item.addEventListener('click', () => selectArticle(article.path)); els.list.appendChild(item); }); }
    function selectArticle(path) { const article = articles.find((item) => item.path === path); if (!article) return; selectedPath = article.path; selectedSha = article.sha; els.title.value = article.title; els.category.value = article.category; els.slug.value = article.slug; els.video.value = article.video; els.content.value = article.content; renderPreview(); renderList(); setTab('write'); }
    function newArticle() { selectedPath = ''; selectedSha = ''; els.title.value = ''; els.category.value = categories[0].path; els.slug.value = ''; els.video.value = ''; els.content.value = ''; applyTemplate(); renderList(); setStatus('Novo tutorial pronto para preencher.', 'ok'); }
    function applyTemplate() { const title = els.title.value.trim() || 'Novo tutorial'; const videoId = extractYoutubeId(els.video.value.trim()) || 'COLOCAR_ID_DO_VIDEO_AQUI'; els.content.value = `# ${title}\n\n## Resumo\nExplique em poucas linhas o objetivo deste tutorial.\n\n## Vídeo passo a passo\n<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;">\n  <iframe src="https://www.youtube.com/embed/${videoId}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe>\n</div>\n\n## Quando usar\nExplique quando este processo deve ser usado.\n\n## Passo a passo\n1. Descreva o primeiro passo.\n2. Descreva o segundo passo.\n3. Descreva o terceiro passo.\n\n## Erros comuns\n- Liste um erro comum.\n- Liste outro erro comum.\n\n## Como resolver\nExplique como corrigir os erros mais comuns.\n\n## Observações importantes\nInclua alertas, exceções ou detalhes relevantes.`; renderPreview(); }
    async function saveArticle() {
      try {
        setStatus('Publicando no GitHub...'); saveConfig(); const cfg = config(); requireConfig(cfg);
        const title = els.title.value.trim(); const slug = slugify(els.slug.value || title); const category = els.category.value;
        if (!title) throw new Error('Informe o título.'); if (!slug) throw new Error('Informe o slug do arquivo.');
        const previousPath = selectedPath; const path = `${cfg.basePath}/${category}/${slug}.md`; let content = els.content.value.trim(); if (!content.startsWith('# ')) content = `# ${title}\n\n${content}`;
        const existing = articles.find((item) => item.path === path); const sha = selectedSha && selectedPath === path ? selectedSha : existing?.sha;
        const payload = { message: `${sha ? 'Atualiza' : 'Cria'} tutorial: ${title}`, content: encodeBase64(content), branch: cfg.branch }; if (sha) payload.sha = sha;
        const saved = await github(`/repos/${cfg.owner}/${cfg.repo}/contents/${path}`, { method: 'PUT', body: JSON.stringify(payload) });
        selectedPath = path; selectedSha = saved.content.sha; upsertLocalArticle({ path, sha: selectedSha, title, category, slug, video: extractYoutubeId(els.video.value.trim()), content }, previousPath);
        await saveSidebar(); renderList(); setStatus('Tutorial publicado. O GitHub Pages atualiza em instantes.', 'ok');
      } catch (error) { setStatus(error.message, 'error'); }
    }
    async function saveSidebar() { const cfg = config(); const payload = { message: 'Atualiza menu da central de ajuda', content: encodeBase64(buildSidebar()), branch: cfg.branch }; if (sidebarSha) payload.sha = sidebarSha; const saved = await github(`/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.basePath}/_sidebar.md`, { method: 'PUT', body: JSON.stringify(payload) }); sidebarSha = saved.content.sha; }
    function buildSidebar() { const lines = ['- [Início](/)', '- <a href="editor/" target="_self">Editor web</a>']; categories.forEach((category) => { const categoryArticles = articles.filter((article) => article.category === category.path).sort((a,b) => a.title.localeCompare(b.title)); lines.push(`- ${category.label}`); categoryArticles.forEach((article) => lines.push(`  - [${article.title}](${article.category}/${article.slug}.md)`)); }); return lines.join('\n') + '\n'; }
    function upsertLocalArticle(article, previousPath) { articles = articles.filter((item) => item.path !== article.path && item.path !== previousPath); articles.push(article); }
    function removeLocalArticle() { if (!selectedPath) { newArticle(); return; } articles = articles.filter((item) => item.path !== selectedPath); selectedPath = ''; selectedSha = ''; renderList(); newArticle(); setStatus('Removido da lista local. Para apagar no GitHub, remova o arquivo pelo GitHub.', 'ok'); }
    function openOnGithub() { const cfg = config(); if (!cfg.owner || !cfg.repo) { setStatus('Informe dono e repositório.', 'error'); return; } const path = selectedPath || `${cfg.basePath}/${els.category.value}/${slugify(els.slug.value || els.title.value)}.md`; window.open(`https://github.com/${cfg.owner}/${cfg.repo}/edit/${cfg.branch}/${path}`, '_blank', 'noopener,noreferrer'); }
    function setTab(tab) { const preview = tab === 'preview'; els.content.hidden = preview; els.preview.hidden = !preview; els.writeTab.classList.toggle('active', !preview); els.previewTab.classList.toggle('active', preview); if (preview) renderPreview(); }
    function renderPreview() { els.preview.innerHTML = markdownToHtml(els.content.value); }
    async function github(path, options = {}) { const cfg = config(); const response = await fetch(`https://api.github.com${path}`, { ...options, headers: { Accept:'application/vnd.github+json', Authorization:`Bearer ${cfg.token}`, 'X-GitHub-Api-Version':'2022-11-28', ...(options.headers || {}) } }); const data = await response.json().catch(() => ({})); if (!response.ok) throw new Error(data.message || `Erro GitHub ${response.status}`); return data; }
    function requireConfig(cfg) { if (!cfg.owner) throw new Error('Informe o dono do repositório.'); if (!cfg.repo) throw new Error('Informe o repositório.'); if (!cfg.branch) throw new Error('Informe a branch.'); if (!cfg.basePath) throw new Error('Informe a pasta da ajuda.'); if (!cfg.token) throw new Error('Informe o token GitHub.'); }
    function setStatus(message, type = '') { els.status.textContent = message; els.status.className = `status ${type}`; }
    function extractYoutubeId(value) { if (!value) return ''; const embed = value.match(/youtube\.com\/embed\/([^"?&\s]+)/); const watch = value.match(/[?&]v=([^"&\s]+)/); const short = value.match(/youtu\.be\/([^"?&\s]+)/); return (embed || watch || short || [])[1] || value; }
    function slugify(value) { return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''); }
    function trimSlashes(value) { return value.replace(/^\/+|\/+$/g, ''); }
    function encodeBase64(value) { return btoa(unescape(encodeURIComponent(value))); }
    function decodeBase64(value) { return decodeURIComponent(escape(atob(String(value || '').replace(/\s/g, '')))); }
    function escapeHtml(value) { return String(value || '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' }[char])); }
    function markdownToHtml(markdown) { let html = escapeHtml(markdown); html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>'); html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>'); html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>'); html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); html = html.replace(/`([^`]+)`/g, '<code>$1</code>'); html = html.replace(/^- (.*)$/gm, '<li>$1</li>'); html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>'); html = html.replace(/^\d+\. (.*)$/gm, '<li>$1</li>'); html = html.replace(/&lt;(div|iframe)(.*?)&gt;/g, '<$1$2>'); html = html.replace(/&lt;\/(div|iframe)&gt;/g, '</$1>'); html = html.replace(/\n{2,}/g, '</p><p>'); return `<p>${html}</p>`.replace(/<p>\s*<(h[1-3]|ul|div)/g, '<$1').replace(/<\/(h[1-3]|ul|div)>\s*<\/p>/g, '</$1>'); }
  </script>
</body>
</html>
