<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Central de Ajuda — Rotina Flow</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="Tutoriais e guias de uso do Rotina Flow.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2563eb;
    }

    body {
      color: #0f172a;
      background: #f8fafc;
    }

    .markdown-section {
      max-width: 980px;
    }

    .help-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .help-card {
      border: 1px solid #dbeafe;
      border-radius: 14px;
      background: #fff;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .help-card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .help-editor-link {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 14px 34px rgba(37, 99, 235, 0.28);
    }

    .help-editor-link:hover {
      background: #1d4ed8;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <a class="help-editor-link" href="editor/">Editor</a>
  <script>
    window.$docsify = {
      name: 'Central de Ajuda — Rotina Flow',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Buscar tutorial...',
        noData: 'Nenhum resultado encontrado.',
        depth: 3
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
